name: Web CI/CD

on:
  workflow_dispatch:
  push:
    branches: ["main", "develop"]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "web/**"
      - ".github/workflows/web.yml"

permissions:
  contents: read

concurrency:
  group: web-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Web CI Skeleton
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo "Web workflow scaffold only. No implementation commands configured."
